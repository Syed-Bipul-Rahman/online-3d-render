<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Model Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=Space+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #2a2a3a;
    --accent: #c84b4b;
    --accent2: #e8a87c;
    --text: #e8e8f0;
    --muted: #666680;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .logo span { color: var(--accent); }

  .model-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .stats {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.7;
  }

  .stats b { color: var(--accent2); }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #canvas-container {
    flex: 1;
    position: relative;
    cursor: grab;
  }

  #canvas-container:active { cursor: grabbing; }

  canvas { display: block; width: 100% !important; height: 100% !important; }

  .sidebar {
    width: 240px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .section {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .upload-zone:hover { border-color: var(--accent); background: rgba(200,75,75,0.05); }

  .upload-zone input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-zone .icon { font-size: 22px; margin-bottom: 6px; }
  .upload-zone p { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .upload-zone p b { color: var(--text); display: block; font-size: 12px; margin-bottom: 2px; }

  .file-list { display: flex; flex-direction: column; gap: 6px; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.03);
    border-radius: 5px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
  }

  .file-item .ext {
    background: var(--accent);
    color: white;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: bold;
    min-width: 32px;
    text-align: center;
  }

  .file-item .ext.mtl { background: #4b7cc8; }
  .file-item .ext.png { background: #4bc87a; color: #000; }
  .file-item .ext.obj { background: var(--accent); }

  .file-item .fname { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .fstatus { margin-left: auto; color: #4bc87a; font-size: 13px; }
  .file-item .fstatus.pending { color: var(--muted); }

  .btn {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 12px;
  }

  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .control-label { font-size: 12px; color: var(--muted); }

  .toggle {
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
  }

  .toggle.on { background: var(--accent); }

  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle.on::after { transform: translateX(16px); }

  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    margin-top: 6px;
  }

  .texture-preview {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #000;
  }

  .texture-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: radial-gradient(ellipse at center, #141420 0%, #0a0a0f 100%);
    pointer-events: none;
    transition: opacity 0.4s;
  }

  #overlay.hidden { opacity: 0; }

  #overlay .big-icon { font-size: 52px; opacity: 0.2; }

  #overlay p {
    font-size: 14px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }

  #loading-bar {
    width: 200px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }

  #loading-bar.active { display: block; }

  #loading-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    border-radius: 2px;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 7px;
  }

  .meta-row .k { color: var(--muted); font-family: 'Space Mono', monospace; }
  .meta-row .v { color: var(--accent2); font-family: 'Space Mono', monospace; font-weight: bold; }

  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span>///</span> OBJ Viewer</div>
  <div class="model-name" id="header-name">No model loaded</div>
  <div class="stats" id="header-stats">
    Drag files to load &nbsp;·&nbsp; Orbit: left drag &nbsp;·&nbsp; Zoom: scroll
  </div>
</header>

<div class="main">
  <div id="canvas-container">
    <div class="grid-bg"></div>
    <div id="overlay">
      <div class="big-icon">⬡</div>
      <p>Load your .obj, .mtl and .png files</p>
      <div id="loading-bar"><div id="loading-fill"></div></div>
    </div>
  </div>

  <div class="sidebar">
    <!-- Upload -->
    <div class="section">
      <div class="section-title">Files</div>
      <div class="upload-zone" id="drop-zone">
        <input type="file" id="file-input" multiple accept=".obj,.mtl,.png,.jpg,.jpeg">
        <div class="icon">📂</div>
        <p><b>Click or drag & drop</b>.obj + .mtl + .png</p>
      </div>
      <div class="file-list" id="file-list" style="margin-top:10px;"></div>
      <button class="btn" id="load-btn" disabled>Load Model</button>
    </div>

    <!-- Controls -->
    <div class="section">
      <div class="section-title">Controls</div>
      <div class="control-row">
        <span class="control-label">Wireframe</span>
        <button class="toggle" id="toggle-wire"></button>
      </div>
      <div class="control-row">
        <span class="control-label">Auto-rotate</span>
        <button class="toggle on" id="toggle-rotate"></button>
      </div>
      <div class="control-row">
        <span class="control-label">Grid</span>
        <button class="toggle on" id="toggle-grid"></button>
      </div>
      <div style="margin-top:4px;">
        <div class="control-label" style="margin-bottom:4px;">Light intensity</div>
        <input type="range" id="light-range" min="0" max="4" step="0.1" value="1.5">
      </div>
    </div>

    <!-- Texture preview -->
    <div class="section" id="tex-section" style="display:none;">
      <div class="section-title">Texture Atlas</div>
      <div class="texture-preview"><img id="tex-preview" src=""></div>
    </div>

    <!-- Model info -->
    <div class="section" id="info-section" style="display:none;">
      <div class="section-title">Model Info</div>
      <div id="meta-rows"></div>
    </div>

    <!-- Export -->
    <div class="section" id="export-section" style="display:none;">
      <div class="section-title">Export</div>
      <button class="btn" id="export-gltf-btn" style="background:var(--accent2);color:#1a1000;">&#11015; Export as GLTF</button>
      <button class="btn" id="export-glb-btn" style="margin-top:8px;">&#11015; Export as GLB</button>
      <div id="export-status" style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:8px;text-align:center;min-height:14px;"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── GLTFExporter (self-contained, compatible with r128) ────────────────────
// Minimal but complete implementation supporting geometry + texture
THREE.GLTFExporter = class {
  parse(input, onDone, options = {}) {
    const binary = options.binary || false;
    const scene = input;
    const gltf = {
      asset: { version: '2.0', generator: 'OBJViewer/GLTFExporter' },
      scene: 0, scenes: [{ nodes: [] }],
      nodes: [], meshes: [], materials: [], textures: [], images: [],
      accessors: [], bufferViews: [], buffers: []
    };

    const buffers = [];
    let byteOffset = 0;

    function addBuffer(data) {
      const arr = data instanceof Float32Array ? data : new Float32Array(data);
      const buf = arr.buffer;
      buffers.push(arr);
      const bv = { buffer: 0, byteOffset, byteLength: buf.byteLength };
      gltf.bufferViews.push(bv);
      byteOffset += buf.byteLength;
      // pad to 4 bytes
      const pad = (4 - (buf.byteLength % 4)) % 4;
      if (pad) { buffers.push(new Uint8Array(pad)); byteOffset += pad; }
      return gltf.bufferViews.length - 1;
    }

    function addUint16Buffer(data) {
      const arr = new Uint16Array(data);
      buffers.push(arr);
      const bv = { buffer: 0, byteOffset, byteLength: arr.buffer.byteLength };
      gltf.bufferViews.push(bv);
      byteOffset += arr.buffer.byteLength;
      const pad = (4 - (arr.buffer.byteLength % 4)) % 4;
      if (pad) { buffers.push(new Uint8Array(pad)); byteOffset += pad; }
      return gltf.bufferViews.length - 1;
    }

    function addUint32Buffer(data) {
      const arr = new Uint32Array(data);
      buffers.push(arr);
      const bv = { buffer: 0, byteOffset, byteLength: arr.buffer.byteLength };
      gltf.bufferViews.push(bv);
      byteOffset += arr.buffer.byteLength;
      const pad = (4 - (arr.buffer.byteLength % 4)) % 4;
      if (pad) { buffers.push(new Uint8Array(pad)); byteOffset += pad; }
      return gltf.bufferViews.length - 1;
    }

    // Collect all meshes
    const meshNodes = [];
    scene.traverse(child => { if (child.isMesh) meshNodes.push(child); });

    // Process textures - collect unique textures
    const texMap = new Map();
    meshNodes.forEach(mesh => {
      const mat = mesh.material;
      if (mat && mat.map && !texMap.has(mat.map.uuid)) {
        texMap.set(mat.map.uuid, texMap.size);
      }
    });

    // Add texture image data as base64
    const texPromises = [];
    texMap.forEach((idx, uuid) => {
      // Find the texture object
      let tex = null;
      meshNodes.forEach(m => { if (m.material && m.material.map && m.material.map.uuid === uuid) tex = m.material.map; });
      if (!tex || !tex.image) return;
      const p = new Promise(res => {
        const img = tex.image;
        const canvas = document.createElement('canvas');
        canvas.width = img.width || img.naturalWidth || 1024;
        canvas.height = img.height || img.naturalHeight || 1024;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataURI = canvas.toDataURL('image/png');
        const base64 = dataURI.split(',')[1];
        gltf.images.push({ uri: 'data:image/png;base64,' + base64 });
        gltf.textures.push({ source: gltf.images.length - 1 });
        res();
      });
      texPromises.push(p);
    });

    Promise.all(texPromises).then(() => {
      meshNodes.forEach((mesh, mi) => {
        const geo = mesh.geometry;
        const mat = mesh.material;
        const posAttr = geo.attributes.position;
        const uvAttr = geo.attributes.uv;
        const norAttr = geo.attributes.normal;

        // Position
        const posArr = Array.from(posAttr.array);
        // Compute bounds
        let minX=Infinity,minY=Infinity,minZ=Infinity,maxX=-Infinity,maxY=-Infinity,maxZ=-Infinity;
        for (let i=0;i<posArr.length;i+=3){
          minX=Math.min(minX,posArr[i]);minY=Math.min(minY,posArr[i+1]);minZ=Math.min(minZ,posArr[i+2]);
          maxX=Math.max(maxX,posArr[i]);maxY=Math.max(maxY,posArr[i+1]);maxZ=Math.max(maxZ,posArr[i+2]);
        }
        const posBV = addBuffer(new Float32Array(posArr));
        const posAcc = { bufferView: posBV, componentType: 5126, count: posAttr.count, type: 'VEC3', min:[minX,minY,minZ], max:[maxX,maxY,maxZ] };
        gltf.accessors.push(posAcc);
        const posAccIdx = gltf.accessors.length - 1;

        const attrs = { POSITION: posAccIdx };

        if (uvAttr) {
          // GLTF spec: V=0 is top, Three.js: V=0 is bottom — flip V to match GLTF convention
          const uvFlipped = new Float32Array(uvAttr.array.length);
          for (let i = 0; i < uvAttr.array.length; i += 2) {
            uvFlipped[i]     = uvAttr.array[i];       // U unchanged
            uvFlipped[i + 1] = 1.0 - uvAttr.array[i + 1]; // V flipped
          }
          const uvBV = addBuffer(uvFlipped);
          gltf.accessors.push({ bufferView: uvBV, componentType: 5126, count: uvAttr.count, type: 'VEC2' });
          attrs.TEXCOORD_0 = gltf.accessors.length - 1;
        }

        if (norAttr) {
          const norBV = addBuffer(new Float32Array(norAttr.array));
          gltf.accessors.push({ bufferView: norBV, componentType: 5126, count: norAttr.count, type: 'VEC3' });
          attrs.NORMAL = gltf.accessors.length - 1;
        }

        // Material
        const gltfMat = { pbrMetallicRoughness: { metallicFactor: 0, roughnessFactor: mat.roughness || 0.75 } };
        if (mat.map && texMap.has(mat.map.uuid)) {
          gltfMat.pbrMetallicRoughness.baseColorTexture = { index: texMap.get(mat.map.uuid) };
        }
        if (mat.color) {
          gltfMat.pbrMetallicRoughness.baseColorFactor = [mat.color.r, mat.color.g, mat.color.b, 1];
        }
        gltf.materials.push(gltfMat);

        gltf.meshes.push({ primitives: [{ attributes: attrs, material: gltf.materials.length - 1, mode: 4 }] });
        gltf.nodes.push({ mesh: gltf.meshes.length - 1 });
        gltf.scenes[0].nodes.push(gltf.nodes.length - 1);
      });

      // Combine all buffers
      const totalBytes = buffers.reduce((s, b) => s + (b.buffer || b).byteLength, 0);
      const combined = new Uint8Array(totalBytes);
      let offset = 0;
      buffers.forEach(b => {
        const view = new Uint8Array(b.buffer || b);
        combined.set(view, offset);
        offset += view.byteLength;
      });

      gltf.buffers = [{ byteLength: combined.byteLength }];

      if (binary) {
        // GLB
        const jsonStr = JSON.stringify(gltf);
        const jsonBytes = new TextEncoder().encode(jsonStr);
        const jsonPadded = new Uint8Array(Math.ceil(jsonBytes.length / 4) * 4);
        jsonPadded.set(jsonBytes);
        for (let i = jsonBytes.length; i < jsonPadded.length; i++) jsonPadded[i] = 0x20;

        const binPadded = new Uint8Array(Math.ceil(combined.length / 4) * 4);
        binPadded.set(combined);

        const totalLen = 12 + 8 + jsonPadded.length + 8 + binPadded.length;
        const glb = new DataView(new ArrayBuffer(totalLen));
        let o = 0;
        glb.setUint32(o, 0x46546C67, true); o+=4; // magic "glTF"
        glb.setUint32(o, 2, true); o+=4;           // version
        glb.setUint32(o, totalLen, true); o+=4;    // total length
        glb.setUint32(o, jsonPadded.length, true); o+=4;
        glb.setUint32(o, 0x4E4F534A, true); o+=4;  // JSON
        new Uint8Array(glb.buffer).set(jsonPadded, o); o += jsonPadded.length;
        glb.setUint32(o, binPadded.length, true); o+=4;
        glb.setUint32(o, 0x004E4942, true); o+=4;  // BIN
        new Uint8Array(glb.buffer).set(binPadded, o);
        onDone(glb.buffer);
      } else {
        // GLTF — embed buffer as base64
        const b64 = btoa(String.fromCharCode(...combined));
        gltf.buffers = [{ uri: 'data:application/octet-stream;base64,' + b64, byteLength: combined.byteLength }];
        onDone(JSON.stringify(gltf, null, 2));
      }
    });
  }
};
</script>
<script>
// ── Minimal OBJLoader ──────────────────────────────────────────────────────
class OBJLoader {
  parse(text) {
    const lines = text.split('\n');
    const positions = [], uvs = [], normals = [];
    const groups = {};
    let currentMat = 'default';

    for (let line of lines) {
      line = line.trim();
      if (!line || line[0] === '#') continue;
      const parts = line.split(/\s+/);
      const cmd = parts[0];
      if (cmd === 'v')  positions.push(+parts[1], +parts[2], +parts[3]);
      else if (cmd === 'vt') uvs.push(+parts[1], +parts[2]);
      else if (cmd === 'vn') normals.push(+parts[1], +parts[2], +parts[3]);
      else if (cmd === 'usemtl') currentMat = parts[1];
      else if (cmd === 'f') {
        if (!groups[currentMat]) groups[currentMat] = { pos: [], uv: [], nor: [] };
        const g = groups[currentMat];
        const verts = parts.slice(1);
        // triangulate fan
        for (let i = 1; i < verts.length - 1; i++) {
          for (const vi of [verts[0], verts[i], verts[i+1]]) {
            const idx = vi.split('/');
            const pi = (+idx[0] - 1) * 3;
            g.pos.push(positions[pi], positions[pi+1], positions[pi+2]);
            if (idx[1]) {
              const ti = (+idx[1] - 1) * 2;
              g.uv.push(uvs[ti], uvs[ti+1]);
            }
            if (idx[2]) {
              const ni = (+idx[2] - 1) * 3;
              g.nor.push(normals[ni], normals[ni+1], normals[ni+2]);
            }
          }
        }
      }
    }

    const group = new THREE.Group();
    let totalVerts = 0;
    for (const [mat, data] of Object.entries(groups)) {
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(data.pos, 3));
      if (data.uv.length) geo.setAttribute('uv', new THREE.Float32BufferAttribute(data.uv, 2));
      if (data.nor.length) geo.setAttribute('normal', new THREE.Float32BufferAttribute(data.nor, 3));
      else geo.computeVertexNormals();
      totalVerts += data.pos.length / 3;
      const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0xcccccc }));
      mesh.userData.matName = mat;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      group.add(mesh);
    }
    group.userData.totalVerts = totalVerts;
    return group;
  }
}

// ── MTL parser ───────────────────────────────────────────────────────────
function parseMTL(text) {
  const mats = {};
  let cur = null;
  for (let line of text.split('\n')) {
    line = line.trim();
    const p = line.split(/\s+/);
    if (p[0] === 'newmtl') { cur = p[1]; mats[cur] = {}; }
    else if (cur && p[0] === 'map_Kd') mats[cur].map_Kd = p[1];
    else if (cur && p[0] === 'Kd') mats[cur].Kd = [+p[1], +p[2], +p[3]];
  }
  return mats;
}

// ── Three.js Scene ─────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 30, 80);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 200);
camera.position.set(0, 1, 4);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xffe8d0, 0.4);
fillLight.position.set(-5, 2, -5);
scene.add(fillLight);

// Grid
const grid = new THREE.GridHelper(20, 40, 0x222233, 0x1a1a28);
scene.add(grid);

// Orbit controls (manual)
let isDragging = false, lastX = 0, lastY = 0;
let rotX = 0, rotY = 0, zoom = 4;
let autoRotate = true;
let currentModel = null;

container.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; autoRotate = false; document.getElementById('toggle-rotate').classList.remove('on'); });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  rotY += (e.clientX - lastX) * 0.4;
  rotX += (e.clientY - lastY) * 0.2;
  rotX = Math.max(-80, Math.min(80, rotX));
  lastX = e.clientX; lastY = e.clientY;
});
container.addEventListener('wheel', e => { zoom = Math.max(0.5, zoom + e.deltaY * 0.005); }, { passive: true });

// Touch
let lastTouchX = 0, lastTouchY = 0;
container.addEventListener('touchstart', e => { isDragging = true; lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY; autoRotate = false; });
container.addEventListener('touchend', () => isDragging = false);
container.addEventListener('touchmove', e => {
  if (!isDragging) return;
  rotY += (e.touches[0].clientX - lastTouchX) * 0.4;
  rotX += (e.touches[0].clientY - lastTouchY) * 0.2;
  lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
});

function animate() {
  requestAnimationFrame(animate);
  const W = container.clientWidth, H = container.clientHeight;
  if (renderer.domElement.width !== W || renderer.domElement.height !== H) {
    renderer.setSize(W, H, false);
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
  }
  if (autoRotate) rotY += 0.3;
  const rx = rotX * Math.PI / 180, ry = rotY * Math.PI / 180;
  camera.position.x = Math.sin(ry) * Math.cos(rx) * zoom;
  camera.position.y = Math.sin(rx) * zoom;
  camera.position.z = Math.cos(ry) * Math.cos(rx) * zoom;
  camera.lookAt(0, 0.5, 0);
  renderer.render(scene, camera);
}
animate();

// ── File handling ──────────────────────────────────────────────────────────
let files = { obj: null, mtl: null, png: null };

const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
const loadBtn = document.getElementById('load-btn');
const overlay = document.getElementById('overlay');
const loadBar = document.getElementById('loading-bar');
const loadFill = document.getElementById('loading-fill');

function updateFileList() {
  fileList.innerHTML = '';
  const types = { obj: 'OBJ', mtl: 'MTL', png: 'PNG' };
  for (const [k, label] of Object.entries(types)) {
    const f = files[k];
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `
      <span class="ext ${k}">${label}</span>
      <span class="fname">${f ? f.name : 'not loaded'}</span>
      <span class="fstatus ${f ? '' : 'pending'}">${f ? '✓' : '○'}</span>
    `;
    fileList.appendChild(item);
  }
  loadBtn.disabled = !files.obj;
}

async function handleFiles(fileArr) {
  for (const f of fileArr) {
    const ext = f.name.split('.').pop().toLowerCase();
    if (ext === 'obj') files.obj = f;
    else if (ext === 'mtl') files.mtl = f;
    else if (['png','jpg','jpeg'].includes(ext)) files.png = f;
  }
  updateFileList();
  // Show texture preview
  if (files.png) {
    const url = URL.createObjectURL(files.png);
    document.getElementById('tex-preview').src = url;
    document.getElementById('tex-section').style.display = 'block';

    // If model already loaded, hot-swap the texture properly
    if (currentModel) {
      readFileURL(files.png).then(dataURL => {
        const newTex = new THREE.TextureLoader().load(dataURL, () => {
          newTex.encoding = THREE.sRGBEncoding;
          newTex.flipY = true;
          newTex.needsUpdate = true;
          currentModel.traverse(child => {
            if (child.isMesh && child.material) {
              if (child.material.map) child.material.map.dispose();
              child.material.map = newTex;
              child.material.color.set(0xffffff);
              child.material.needsUpdate = true;
            }
          });
        });
      });
    }
  }
}

fileInput.addEventListener('change', e => handleFiles([...e.target.files]));

const dropZone = document.getElementById('drop-zone');
document.body.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
document.body.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
document.body.addEventListener('drop', e => { e.preventDefault(); dropZone.style.borderColor = ''; handleFiles([...e.dataTransfer.files]); });

function readFile(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsText(f);
  });
}

function readFileURL(f) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(f);
  });
}

loadBtn.addEventListener('click', async () => {
  if (!files.obj) return;
  loadBtn.disabled = true;
  overlay.classList.remove('hidden');
  loadBar.classList.add('active');
  loadFill.style.width = '20%';

  try {
    // Remove old model
    if (currentModel) { scene.remove(currentModel); currentModel = null; }

    loadFill.style.width = '40%';
    const objText = await readFile(files.obj);
    loadFill.style.width = '60%';

    const loader = new OBJLoader();
    const model = loader.parse(objText);

    // Apply texture
    let texture = null;
    if (files.png) {
      const dataURL = await readFileURL(files.png);
      texture = await new Promise(res => {
        const t = new THREE.TextureLoader().load(dataURL, res);
        t.encoding = THREE.sRGBEncoding;
        t.flipY = true; // Meshy AI / standard OBJ exporters need flipY=true
      });
    }

    // Apply MTL + texture to meshes
    let mtlData = {};
    if (files.mtl) {
      const mtlText = await readFile(files.mtl);
      mtlData = parseMTL(mtlText);
    }

    let totalTris = 0;
    model.traverse(child => {
      if (child.isMesh) {
        const matName = child.userData.matName;
        const matInfo = mtlData[matName] || {};
        const mat = new THREE.MeshStandardMaterial({
          map: texture || null,
          // When a texture is present, always use white so it doesn't tint the atlas
          color: texture ? 0xffffff : (matInfo.Kd ? new THREE.Color(...matInfo.Kd) : 0xcccccc),
          roughness: 0.75,
          metalness: 0.0,
        });
        if (texture) mat.needsUpdate = true;
        child.material = mat;
        totalTris += child.geometry.attributes.position.count / 3;
      }
    });

    loadFill.style.width = '80%';

    // Center and scale model
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2.5 / maxDim;
    model.scale.setScalar(scale);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center.multiplyScalar(scale));
    model.position.y += size.y * scale / 2;

    scene.add(model);
    currentModel = model;

    // Adjust zoom
    zoom = maxDim * scale * 2.2;

    loadFill.style.width = '100%';
    setTimeout(() => {
      overlay.classList.add('hidden');
      loadBar.classList.remove('active');
      loadFill.style.width = '0%';
    }, 400);

    // Update info
    document.getElementById('header-name').textContent = files.obj.name.replace('.obj', '');
    document.getElementById('header-stats').innerHTML = `
      Vertices: <b>${model.userData.totalVerts?.toLocaleString() || '—'}</b> &nbsp;·&nbsp;
      Triangles: <b>${Math.round(totalTris).toLocaleString()}</b>
    `;

    // Meta section
    document.getElementById('info-section').style.display = 'block';
    document.getElementById('meta-rows').innerHTML = `
      <div class="meta-row"><span class="k">vertices</span><span class="v">${model.userData.totalVerts?.toLocaleString()}</span></div>
      <div class="meta-row"><span class="k">triangles</span><span class="v">${Math.round(totalTris).toLocaleString()}</span></div>
      <div class="meta-row"><span class="k">size X</span><span class="v">${size.x.toFixed(2)}</span></div>
      <div class="meta-row"><span class="k">size Y</span><span class="v">${size.y.toFixed(2)}</span></div>
      <div class="meta-row"><span class="k">size Z</span><span class="v">${size.z.toFixed(2)}</span></div>
      <div class="meta-row"><span class="k">materials</span><span class="v">${Object.keys(mtlData).length || 1}</span></div>
    `;
    document.getElementById('export-section').style.display = 'block';

  } catch (err) {
    console.error(err);
    alert('Error loading model: ' + err.message);
    overlay.classList.remove('hidden');
  }

  loadBtn.disabled = false;
  updateFileList();
});

// Toggle controls
document.getElementById('toggle-wire').addEventListener('click', function() {
  this.classList.toggle('on');
  const on = this.classList.contains('on');
  scene.traverse(c => { if (c.isMesh && c.material) c.material.wireframe = on; });
});

document.getElementById('toggle-rotate').addEventListener('click', function() {
  this.classList.toggle('on');
  autoRotate = this.classList.contains('on');
});

document.getElementById('toggle-grid').addEventListener('click', function() {
  this.classList.toggle('on');
  grid.visible = this.classList.contains('on');
});

document.getElementById('light-range').addEventListener('input', function() {
  dirLight.intensity = +this.value;
  ambient.intensity = +this.value * 0.27;
});

// ── Show export section after model loads ──────────────────────────────────
// (called inside loadBtn click, patched here via model load completion)
const _origLoadBtn = loadBtn.onclick;

function showExportSection() {
  document.getElementById('export-section').style.display = 'block';
}

// ── GLTF / GLB Export ─────────────────────────────────────────────────────
function doExport(binary) {
  if (!currentModel) return;
  const status = document.getElementById('export-status');
  status.textContent = 'Exporting…';

  // Build a clean scene with only the model (no grid/lights)
  const exportScene = new THREE.Scene();
  const clone = currentModel.clone(true);
  // Reset transforms that were applied for display centering/scaling
  exportScene.add(clone);

  const exporter = new THREE.GLTFExporter();
  exporter.parse(exportScene, (result) => {
    const modelName = (files.obj ? files.obj.name.replace('.obj','') : 'model');
    if (binary) {
      const blob = new Blob([result], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = modelName + '.glb'; a.click();
      URL.revokeObjectURL(url);
      status.textContent = '✓ GLB saved!';
    } else {
      const blob = new Blob([result], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = modelName + '.gltf'; a.click();
      URL.revokeObjectURL(url);
      status.textContent = '✓ GLTF saved!';
    }
    setTimeout(() => { status.textContent = ''; }, 3000);
  }, { binary });
}

document.getElementById('export-gltf-btn').addEventListener('click', () => doExport(false));
document.getElementById('export-glb-btn').addEventListener('click', () => doExport(true));
</script>
